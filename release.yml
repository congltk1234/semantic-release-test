name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write      # cần để tạo tag, commit CHANGELOG, tạo release
  issues: write        # để comment vào issue liên quan
  pull-requests: write # để comment vào PR liên quan
  id-token: write      # cần nếu publish npm với provenance

jobs:
  release:
    runs-on: ubuntu-latest
    concurrency:
      group: release-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # bắt buộc: semantic-release cần full git history

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test --if-present

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # NPM_TOKEN: ${{ secrets.NPM_TOKEN }}  # bỏ comment nếu publish npm
        run: npx semantic-release
